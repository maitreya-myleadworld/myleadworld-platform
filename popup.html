<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { width: 320px; height: 450px; } [cite: 9]
    @keyframes pulse-border {
      0% { border-color: rgba(6, 182, 212, 0.5); }
      50% { border-color: rgba(6, 182, 212, 1); }
      100% { border-color: rgba(6, 182, 212, 0.5); }
    }
    .active-ring { animation: pulse-border 2s infinite; } [cite: 13]
  </style>
</head>
<body class="bg-[#020617] text-white border-2 border-cyan-500/20 active-ring">
  <div class="p-5 flex flex-col h-full">
    <div class="flex items-center gap-2 mb-6 font-bold text-lg">MyLeadWorld</div>

    <div id="loading" class="flex-grow flex flex-col items-center justify-center space-y-4">
      <div class="w-12 h-12 border-4 border-t-cyan-500 rounded-full animate-spin"></div>
      <p id="status-text" class="text-slate-400 text-sm">Scanning LinkedIn...</p> [cite: 14]
    </div>

    <div id="data-view" class="hidden flex-grow space-y-4">
      <div class="bg-slate-900 rounded-xl p-4 border border-slate-800">
        <h3 id="lead-name" class="font-bold text-lg text-white">---</h3>
        <p id="lead-headline" class="text-xs text-slate-400 mt-1">---</p> [cite: 25]
      </div>
      <button id="import-btn" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-xl">Import Lead</button> [cite: 15]
    </div>

    <div class="mt-auto pt-4 border-t border-slate-800 flex justify-between text-[10px]">
      <span id="credit-count">Credits: 420</span> [cite: 16]
      <span class="text-cyan-500">v1.0.0</span>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      if (tab?.url?.includes("linkedin.com")) { [cite: 18]
        chrome.tabs.sendMessage(tab.id, { action: "GET_PROFILE" }, (response) => {
          if (response) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('data-view').classList.remove('hidden');
            document.getElementById('lead-name').innerText = response.name; [cite: 25]
            document.getElementById('lead-headline').innerText = response.headline;
          }
        });
      } else {
        document.getElementById('status-text').innerText = "Please navigate to a LinkedIn Profile."; [cite: 18]
      }
    });
  </script>
</body>
</html>
